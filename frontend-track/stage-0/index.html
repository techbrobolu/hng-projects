<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
			rel="stylesheet" />
		<link rel="stylesheet" href="style.css" />
		<title>HNG | Todo Card</title>
	</head>
	<body>
		<div class="project-title">
			<h1>Todo Card</h1>
		</div>
		<article data-testid="test-todo-card" class="todo-card">
			<div class="card-header">
				<input
					data-testid="test-todo-complete-toggle"
					type="checkbox"
					name="complete-toggle"
					aria-labelledby="test-todo-title"
					class="complete-toggle" />
				<div class="main-header-section">
					<h2 data-testid="test-todo-title" class="todo-card__title">
						Redesign landing page hero section
					</h2>
					<div class="header-tags">
						<span data-testid="test-todo-status" class="todo-card__status">IN PROGRESS</span>
						<span data-testid="test-todo-priority" class="todo-card__priority">MEDIUM</span>
					</div>
				</div>
			</div>

			<p data-testid="test-todo-description" class="todo-card__description">
				Update the hero layout to match new brand guidelines and improve mobile responsiveness.
			</p>

			<div class="time-details">
				<div class="due-date">
					<img src="assets/calendar.svg" alt="calendar-icon" />
					<time data-testid="test-todo-due-date" class="todo-card__due-date">
						Due Apr 16, 2026
					</time>
				</div>
				<div class="remaining-time">
					<img src="assets/clock.svg" alt="clock-icon" />
					<time data-testid="test-todo-time-remaining" class="todo-card__time-remaining"></time>
				</div>
			</div>

			<ul data-testid="test-todo-tags" role="list" class="category-tags">
				<li data-testid="test-todo-tag-design" class="category-tag design">Design</li>
				<li data-testid="test-todo-tag-frontend" class="category-tag frontend">Frontend</li>
				<li data-testid="test-todo-tag-ux" class="category-tag ux">UX</li>
			</ul>

			<div class="card-footer-section">
				<button data-testid="test-todo-edit-button" class="edit-todo">Edit</button>
				<button data-testid="test-todo-delete-button" class="delete-todo">Delete</button>
			</div>
		</article>
	</body>
</html>
